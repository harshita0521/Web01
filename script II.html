<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Creation</title>
</head>

<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

/* Body */
body{
background-color:#f5f7fb;
color:#333;
}

/* Header */
header{
    background:#0b1d3a;
    color:white;
    margin-bottom: 30px;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#footer{
        width: 100%;
        height: auto;
        margin-top: 30px;
        color: white;
        background: #0b1d3a;
        text-align: center;
        padding: 10px;
        clear: both;
    }



/* Mobile Devices */
@media (max-width: 600px){

    header{
        font-size:20px;
        padding:15px;
    }

    #footer{
        margin-top: 30px;
        font-size:14px;
        padding:10px;
    }
}

</style>

<body>
    <header>Creating Tag By JavaScript</header>

    <script>
        var p= document.createElement("img")
        document.body.appendChild(p)
        p.src="Images/j1.jpg"
        p.style="transition:0.50s;margin-left:30%;border-radius:10px;cursor:pointer; width:40%;"
        p.style.boxShadow="0px 2px 10px gray"

        p.onclick=function()
        {
            p.src="Images/j2.jpg"
        }

        p.onmouseout=function()
        {
            p.src="Images/j1.jpg"
            p.style.transform="scale(1)"
        }
        
        p.onmouseover=function()
        {
            this.style.transform="scale(1.10)"
        }
    </script>

<footer>
        <div id="footer">&copy; 2026 Harshita | All Rights Reserved</div>
    </footer>

</body>
</html>
