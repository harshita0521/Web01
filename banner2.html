<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner type 2</title>
</head>
<body>
<header>
    <img src="Images/p1.jpg" class="pic">
    <img src="Images/p2.jpg" class="pic">
    <img src="Images/p3.jpg" class="pic">
    <img src="Images/p4.jpg" class="pic">
    <img src="Images/p10.jpg" class="pic">
</header>
</body>
<style>
    @keyframes runbanner
    {
        10%{left:0%;}
        20%{left:-19%;}
        30%{left:-19%;}
        40%{left:-38%;}
        50%{left:-38%;}
        60%{left:-57%;}
        70%{left:-57%;}
        80%{left:-76%;}
        90%{left:-76%;}
    }
    body{
        overflow:hidden;
    }

header{
    //background: rgb(5, 5, 37);
    width:550%;
    height:600px;
    overflow:hidden;
}

.pic
{
    width:19%;
    height:100%;
    position:relative;
    left:0%;
    animation:runbanner 20s linear infinite  ;

}
</style>

    

</html>
