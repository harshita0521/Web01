<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
</head>

<style>

    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

/* Body */
body{
background-color:#f5f7fb;
color:#333;
}

/* Header */
header{
    background:#0b1d3a;
    color:white;
    margin-bottom: 30px;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Canvas */

#mycan{
    display:block;
    width:90%;
    max-width:900px;
    height:500px;
    margin:30px auto;
    background:#fff8e8;
    border:4px solid #0b1d3a;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    cursor:crosshair;
}

footer{
        width: 100%;
        height: auto;
        margin-top: 30px;
        color: white;
        background: #0b1d3a;
        text-align: center;
        padding: 10px;
    }

/* Mobile Devices */
@media (max-width: 600px){

    header{
        font-size:20px;
        padding:15px;
        
    }

    #mycan{
        width:95%;
        height:400px;
        border-width:3px;
        border-radius:12px;
    }

    #footer{
        font-size:14px;
        padding:10px;
    }
}
</style>

<body>
    <header>Keyboard Activity</header>

    <canvas id="mycan" style="background: bisque;" width="600" height="600"></canvas>

    <script>
        var c = document.getElementById("mycan");
        var k;
        var r = 10
        var d = c.getContext("2d");
        c.width = c.offsetWidth;
        c.height = c.offsetHeight;
        var red,green,blue,drawcolor

        function f1(event)
        {
            //alert(event.keycode)
            k = event.key
            switch(k)
            {
                case "r":
                    if(r<100)
                    {
                        r=r+1
                            document.title = r
                    }
                    break;
                    case "t":
                        if(r>10)
                    {
                        r=r-1
                        document.title = r
                    }
                    break;

                    case "q":
                        d.clearRect(0,0,window.innerWidth,window.innerHeight)

                    break;    
            }
        }

        function draw(event)
        {
            //document.title="x ="+event.pageX+" y ="+event.pageY
            var x = event.pageX
            var y = event.pageY
            red = Math.round(Math.random()*255)
            green = Math.round(Math.random()*255)
            blue = Math.round(Math.random()*255)

            drawcolor = "rgb("+red+" , "+green+" , "+blue+")"

            d.beginPath();
            d.arc(x,y,r,0,2*Math.PI);
            d.fillStyle = drawcolor
            d.fill()
            d.stroke();
        }

        document.addEventListener("keydown",f1)
        document.addEventListener("mousemove",draw)

    </script>


    <footer> 
        <div id="footer">&copy; 2026 Harshita | All Rights Reserved</div>
    </footer>
</body>
</html>
