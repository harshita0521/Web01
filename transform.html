<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transform</title>
</head>
<style>

@keyframes ani {
    from {transform: rotateY(0deg) rotateX(0deg) rotateZ(0deg)}
    to { transform: rotateY(360deg) rotateX(60deg) rotateZ(10deg)}
}

    *{
    margin: 0%;
    padding: 0%;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f5f7fb;
 }  

 html{
    scroll-behavior: smooth;
 }

 /* Header */
header{
    background:#0b1d3a;
    color:white;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    margin-bottom: 10px;
}

#footer{
        width: 100%;
        height: auto;
        margin: auto;
        color: white;
        background: #0b1d3a;
        text-align: center;
        padding: 10px;
        clear: both;
    }

    #container{
    width: 500px;
    height: 500px;
    background: #f5f7fb;
    margin: auto;
    text-align:center;
    perspective: 1000px;
}

#p1{
    width: 300px;
    height: 300px;
    background: #f5f7fb;
    position: relative;
    top: 50px;
    left: 90px;
    animation: ani 5s linear infinite alternate;
}

#p4{
    width: 300px;
    height: 300px;
    background: #f5f7fb;
    position: relative;
    top: -250px;
    left: 90px;
    backface-visibility: hidden;
    animation: ani 5s linear infinite alternate;
}

.pic{
    width: 100%;
    height: 100%;
    box-shadow: 0px 2px 8px black;
}

/* for mobile screen */
@media (max-width:600px){

    #container{
        width: 100%;
        height: 250px;
        margin: 20px auto;
        perspective: 1000px;
    }


    .pic{
        width: 100%;
        height: 100%;
        margin: auto;
        text-align:center ;
    }

    header{
        font-size:20px;
        padding:15px;
    }

    #footer{
        margin-top: 200px;
        font-size:14px;
        padding:10px;
    }
}

</style>
<body>
    <header>3D Transform-Animation</header>
<div id="container">
<div id="p1">
<img src="Images/p1.jpg" class="pic">
</div>
<div id="p4">
<img src="Images/p4.jpg" class="pic">
</div>
</div>
<div id="footer">&copy; 2026 Harshita | All Rights Reserved</div>
</body>
</html>
