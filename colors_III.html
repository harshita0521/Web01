<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Object</title>
</head>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

/* Body */
body{
    background:#f5f7fb;
    text-align:center;
    min-height:100vh;
    transition:0.5s;
}

/* Header */
header{
    background:#0b1d3a;
    color:white;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Main Box */
.controlbox{
    width:80%;
    max-width:600px;
    margin:50px auto;
    padding:35px;
    border-radius:25px;
    background:white;
    box-shadow:0px 4px 20px rgba(0,0,0,0.2);
}

/* Color Picker */
#mycolor{
    width:120px;
    height:70px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    margin-bottom:30px;
    background:none;
}

/* Range Sliders */
input[type="range"]{
    width:90%;
    margin:20px auto;
    cursor:pointer;
}

/* Labels */
.rgbtext{
    font-size:24px;
    font-weight:bold;
    margin-top:10px;
    color:#0b1d3a;
}


/* Footer */
#footer{
    width:100%;
    margin-top:20px;
    color:white;
    background:#0b1d3a;
    text-align:center;
    padding:12px;
    font-size:16px;
}

/* Mobile Devices */
@media (max-width:600px){

    header{
        font-size:22px;
        padding:15px;
    }

    .controlbox{
        width:90%;
        padding:25px;
        margin:35px auto;
    }

    #mycolor{
        width:100px;
        height:60px;
    }

    .rgbtext{
        font-size:18px;
    }

    input[type="range"]{
        width:95%;
    }

    #footer{
        font-size:14px;
        padding:10px;
    }
}   

</style>

<body>

<header>Interactive RGB Color Controller</header>

<div class="controlbox">

<div class="rgbtext">Choose Color</div>
<input type="color" id="mycolor"><br/>

<div class="rgbtext">Red Color</div>
<input type="range" min="20" max="255" value="50" id="red"><br/>

<div class="rgbtext">Green Color</div>
<input type="range" min="20" max="255" value="50" id="green"><br/>

<div class="rgbtext">Blue Color</div>
<input type="range" min="20" max="255" value="50" id="blue"><br/>

</div>

<script>

    var t
    var r,g,b,c
    var d= document.getElementById("mycolor")
    var red= document.getElementById("red")
    var green= document.getElementById("green")
    var blue= document.getElementById("blue")

    r = Math.round(Math.random()*255)
    g = Math.round(Math.random()*255)
    b = Math.round(Math.random()*255)

    c = `rgb(${r},${g},${b})`

    d.onchange= function()
    {
        document.body.style.color= this.value
    }

    red.onchange = function()
    {
        document.title= this.value
        c2= `rgb(${red.value},${green.value},${blue.value})`
        document.body.style.background=c2
    }

    green.onchange = function()
    {
        document.title= this.value
        c2= `rgb(${red.value},${green.value},${blue.value})`
        document.body.style.background=c2
    }

    blue.onchange = function()
    {
        document.title= this.value
        c2= `rgb(${red.value},${green.value},${blue.value})`
        document.body.style.background=c2
    }

</script>

<footer>
    <div id="footer">
        &copy; 2026 Harshita | All Rights Reserved
    </div>
</footer>    
</body>
</html>
