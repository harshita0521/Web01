<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

/* Body */
body{
    background:#f5f7fb;
    text-align:center;
    min-height:100vh;
}

/* Header */
header{
    background:#0b1d3a;
    color:white;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    margin-bottom:25px;
}

/* Gallery Container */
#gallery{
    width:100%;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    gap:20px;
    padding:20px;
}

/* Images */
.pic{
    width:30%;
    height:260px;
    background: rgb(239, 239, 253);
    padding:10px;
    border-radius:20px;
    object-fit:contain;
    transition:0.5s;
    cursor:pointer;
    box-shadow:0px 4px 12px rgba(0,0,0,0.2);
}

/* Hover Effect */
.pic:hover{
    transform:scale(1.03);
}

/* Footer */
#footer{
    width:100%;
    margin-top:20px;
    color:white;
    background:#0b1d3a;
    text-align:center;
    padding:12px;
    font-size:16px;
}

/* Mobile Devices */
@media (max-width:600px){

    header{
        font-size:22px;
        padding:15px;
    }

    #gallery{
        padding:10px;
        gap:15px;
    }

    .pic{
        width:90%;
        height:240px;
    }

    #footer{
        font-size:14px;
        padding:10px;
    }
}

</style>

<body>

<header>Interactive Image Gallery</header>

<!-- Gallery Container -->
<div id="gallery"></div>

<script>

// Function for loading images

function preload()
{
    for(var i=1; i<=10; i++)
    {
        // Creating Image Object
        var p = new Image()

        // Adding class
        p.className = "pic"

        // Setting image path
        p.src = "Images/p"+i+".jpg"

        // Adding image inside gallery
        document.getElementById("gallery").appendChild(p)

        // Mouse Hover
        p.onmouseover = function()
        {
            this.style.transform = "scale(1.03)"
        }

        // Mouse Out
        p.onmouseout = function()
        {
            this.style.transform = "scale(1)"
        }
    }
}

// Loading function after page loads
window.addEventListener("load", preload)

</script>

<footer>
    <div id="footer">
        &copy; 2026 Harshita | All Rights Reserved
    </div>
</footer>

</body>
