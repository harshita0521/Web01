<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Slider</title>
</head>

<style>

    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

/* Body */
body{
background-color:#f5f7fb;
color:#333;
}

/* Header */
header{
    background:#0b1d3a;
    color:white;
    margin-bottom: 30px;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Popup Div */
.mystyle{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
    animation:popup 0.5s ease;
    z-index:1000;
}

/* GIF */
.mystyle img{
    width:100%;
    height:300px;
    object-fit:cover;
    display:block;
}

/* Close Button */
.mystyle button{
    position:absolute;
    top:10px;
    right:10px;
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#000000;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.mystyle button:hover{
    transform:scale(1.1);
    background:#424242;
}

/* Popup Animation */
@keyframes popup{
    from{
        opacity:0;
        transform:translate(-50%,-50%) scale(0.8);
    }
    to{
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
    }
}

footer{
        width: 100%;
        height: auto;
        margin-top: 550px;
        color: white;
        background: #0b1d3a;
        text-align: center;
        padding: 10px;
        clear: both;
    }

/* Mobile Devices */
@media (max-width: 600px){

    header{
        font-size:20px;
        padding:15px;
        
    }

    .mystyle{
        width:90%;
        max-width:340px;
    }

    .mystyle img{
        height:240px;
    }

    .mystyle button{
        width:30px;
        height:30px;
        font-size:16px;
    }


    #footer{
        font-size:14px;
        padding:10px;
    }
}

    </style>

<body>

    <header>Interactive Popup</header>

    <script>
        var p = document.createElement("div")
        function show(){
            document.body.appendChild(p)
            p.className="mystyle"
            p.innerHTML="<button onclick='body.removeChild(p)' style='margin-left:80%;font-size:8px; border:0;'><h1>X</h1></button>"

            p.innerHTML+="<br/><img style='width:100%' src='Images/ani.gif'>"
            setTimeout("closeadd()",10000)
        }

        var t = setTimeout("show()",1000)

        function closeadd(){
            document.body.removeChild(p)
        }
    </script>

    <footer>
        <div id="footer">&copy; 2026 Harshita | All Rights Reserved</div>
    </footer>
</body>
</html>
