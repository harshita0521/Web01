<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pull Down Menu</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#ffffff;
}

/* Header */

header{
background:#7f5776;
color:white;
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
letter-spacing:2px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
border-bottom-left-radius: 15%;
border-bottom-right-radius: 15%;

}

/* Menu */

.menu{
width:320px;
margin:40px auto;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.menu h3{
background:#f4e9d9;
color:#321E48;
padding:15px;
cursor:pointer;
border-bottom:1px solid #818181;
transition:.3s;
}

.menu h3:hover{
background:#f7c9d0;
}

.menu ul{
display:none;
list-style:none;
background:#f8deee;
}

.menu ul li{
border-bottom:1px solid #eee;
}

.menu ul li a{
display:block;
padding:14px;
text-decoration:none;
color:#333;
transition:.3s;
}

.menu ul li a:hover{
background:#f8deee;
color:#321E48;
padding-left:25px;
}

/* Footer */

footer{
margin-top:40px;
background:#7f5776;
color:white;
text-align:center;
padding:12px;
}

/* Mobile */

@media(max-width:600px){

header{
font-size:22px;
padding:15px;
}

.menu{
width:95%;
}

.menu h3{
font-size:18px;
padding:12px;
}

.menu ul li a{
font-size:15px;
padding:12px;
}

footer{
font-size:14px;
}

}

</style>
</head>

<body>

<header>Pull Down Menu</header>

<div class="menu">

<h3 id="main">📁 Main</h3>

<ul id="mainMenu">
<li><a href="index.html">Profile</a></li>
<li><a href="practice.html">Practice</a></li>
<li><a href="project.html">Project</a></li>
</ul>

<h3 id="project">💻 Projects</h3>

<ul id="projectMenu">
<li><a href="https://www.behance.net/" target="_blank">Behance</a></li>
<li><a href="practice.html">HTML</a></li>
<li><a href="jscript.html">JavaScript</a></li>
<li><a href="jquery.html">jQuery</a></li>
</ul>

<h3 id="social">🌐 Social Media</h3>

<ul id="socialMenu">
<li><a href="https://www.youtube.com" target="_blank">YouTube</a></li>
<li><a href="https://www.instagram.com" target="_blank">Instagram</a></li>
<li><a href="https://www.facebook.com" target="_blank">Facebook</a></li>
</ul>

</div>

<script>

$(document).ready(function(){

$("#main").click(function(){

$("#mainMenu").slideToggle(400);

});

$("#project").click(function(){

$("#projectMenu").slideToggle(400);

});

$("#social").click(function(){

$("#socialMenu").slideToggle(400);

});

});

</script>

<footer>
&copy; 2026 Harshita | All Rights Reserved
</footer>

</body>
</html>
