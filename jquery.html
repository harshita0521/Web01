<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Work</title>
</head>
<style>
    
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

body{
    background:#ffffff;
}

/* Header */
header{
    background:#0b1d3a;
    color:white;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#footer{
        width: 100%;
        height: auto;
        margin: auto;
        color: white;
        background: #0b1d3a;
        text-align: center;
        padding: 10px;
        clear: both;
    }


/* Main Content */
.content ul{
    margin: 20px;
    display:grid;
    list-style: none;
    padding: 0;
    gap: 20px;
}
.content ul li a{
    display: block;
    background: linear-gradient(135deg, #e0edfd, #d6e9ff, #b3d6fe);
    color: #0b1d3a;
    box-shadow: 0px 4px 10px grey;
    padding: 20px 10px;
    margin: 5px;
    text-align: center;
    border-radius: 10px;
    text-decoration: none;
    font-size: 24px;
    transition: 0.3s;

}
.content ul li a:hover{
    padding: 22px;
    font-size: 25px;
    background: linear-gradient(135deg,#acd2fd,#d6e9ff,#e0edfd);
    color: #0b1d3a
}


/* Mobile Devices */
@media (max-width: 600px){

    header{
        font-size:20px;
        padding:15px;
    }

.content ul li a{
    font-size: 20px;
}

    #footer{
        margin-top: 10px;
        font-size:14px;
        padding:10px;
    }
}

</style>
<body>
    <header>jQuery Work</header>
    <div class="content">
        <ul>
            <li><a href="jq.html">Intro to jQuery</a></li>
            <li><a href="pulldown.html">Pulldown Menu</a></li>
        </ul>
    </div>
    <footer>
        <div id="footer">&copy; 2026 Harshita | All Rights Reserved</div>
    </footer>
    </body>
</html>
