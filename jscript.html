<style>
    
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

body{
    background:#ffffff;
}

/* Header */
header{
    background:#0b1d3a;

    text-align:center;
    padding:20px;

}

#footer{

        height: auto;

        background: #0b1d3a;
        text-align: center;
        padding: 10px;
        clear: both;
    }


/* Main Content */
.content ul{
    margin: 20px;
    display:grid;
    list-style: none;
    padding: 0;
    gap: 20px;
}
.content ul li a{
    display: block;
    background: lavender;
   box-shadow: 0px 4px 10px grey;
    color: #020617;
    padding: 20px 10px;
    text-align: center;
    border-radius: 10px;
    text-decoration: none;
    font-size: 24px;
    transition: 0.3s;

}
.content ul li a:hover{
background: #020617;
color: lavender;

}

/* Mobile Devices */
@media (max-width: 600px){

    header{
        font-size:20px;
        padding:15px;
    }

.content ul li a{
    font-size: 20px;
}

    #footer{
        margin-top: 10px;
        font-size:14px;

    }
