<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Work</title>
</head>
<style>
    
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

body{
    background:#f5f7fb;
}

/* Header */
header{
    background:#0b1d3a;
    color:white;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* Main Content */
.content ul{
    margin: 10%;
    display:grid;
    list-style: none;
    padding: 0;
}
.content ul li a{
    display: block;
    background: #0b1d3a;
   box-shadow: 0px 4px 10px grey;
    color: #ffffff;
    padding: 60px 20px;
    text-align: center;
    border-radius: 10px;
    text-decoration: none;
    font-size: 24px;
    transition: 0.3s;

}
.content ul li a:hover{
background: #020617;

}


</style>
<body>
    <header>My Projects</header>
    <div class="content">
        <ul>
            <li><a href="https://harshita0521.github.io/Web02/">AOTM Work</a></li>
        </ul>
    </div>
</body>
</html>
