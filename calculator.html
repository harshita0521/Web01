<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator by JS</title>
</head>

<style>

    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

/* Body */
body{
background-color:#f5f7fb;
color:#333;
text-align: center;
font-size: 20px;
}

/* Header */
header{
    background:#0b1d3a;
    color:white;
    margin-bottom: 30px;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

footer{
        width: 100%;
        height: auto;
        margin-top: 30px;
        color: white;
        background: #0b1d3a;
        text-align: center;
        padding: 10px;
        clear: both;
    }

    /* Input boxes */
    input{
        width: 250px;
        padding: 12px;
        margin: 10px;
        border: 2px solid #0b1d3a;
        border-radius: 8px;
        font-size: 18px;
    }

    /* Result box */
    #r{
        background: #e8f0ff;
        font-weight: bold;
    }

    /* Buttons */
    button{
        padding: 12px 25px;
        margin: 10px;
        font-size: 22px;
        background: #0b1d3a;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.50s;
    }

    
    button:hover{
        transform: scale(1.1);
        background: #16396d;
    }

/* Mobile Devices */
@media (max-width: 600px){

    header{
        font-size:20px;
        padding:15px;
        
    }

    #footer{
        font-size:14px;
        padding:10px;
    } 
    
    body{
        font-size: 16px;
    }

    input{
        width: 85%;
        font-size: 16px;
        padding: 10px;
    }

    button{
        width: 70px;
        padding: 10px;
        font-size: 18px;
        margin: 8px;
    }
    
}
</style>

<body>
    <header>Interactive Calculator</header>
    Enter Number 1 <input type="number" id="t1" value="0"><br>
    Enter Number 2 <input type="number" id="t2" value="0"><br><br>
    Final Result<input type="number" id="r" value="0"><br><br>

    <button onclick="f1()">+</button>
    <button onclick="f2()">-</button>
    <button onclick="f3()">*</button>
    <button onclick="f4()">/</button>

    <script>
       var n1 = document.getElementById("t1") 
       var n2 = document.getElementById("t2") 
       var n = document.getElementById("r") 

        function f1()
        {
            //alert("Program is Working")
            var calculate = parseInt(n1.value)+parseInt(n2.value)
            r.value=calculate
        }

        function f2()
        {
            //alert("Program is Working")
            var calculate = parseInt(n1.value)-parseInt(n2.value)
            r.value=calculate
        }

        function f3()
        {
            //alert("Program is Working")
            var calculate = parseInt(n1.value)*parseInt(n2.value)
            r.value=calculate
        }

        function f4()
        {
            //alert("Program is Working")
            var calculate = parseInt(n1.value)/parseInt(n2.value)
            r.value=calculate
        }

    </script>

    <footer>
        <div id="footer">&copy; 2026 Harshita | All Rights Reserved</div>
    </footer>

</body>
</html>
